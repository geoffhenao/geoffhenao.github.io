<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ BOARD TITLE: ARCADE MODE ]</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --blue-jeopardy: #222;
            --yellow-jeopardy: #336699;
            --panel-bg: #111;
            --text-gold: #f1c40f;
            --neon-glow: rgba(85, 153, 255, 0.5);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: monospace !important;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .board-title {
            width: 100%;
            color: var(--text-gold);
            font-size: clamp(24px, 5vw, 40px);
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--neon-glow);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .game-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 1600px;
        }

        /* Desktop Layout Configuration */
        @media (min-width: 1024px) {
            .game-container {
                grid-template-columns: 280px 1fr 300px;
                align-items: start;
            }
        }

        .panel {
            background-color: var(--panel-bg);
            border: 4px solid var(--yellow-jeopardy);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            width: 100%;
        }

        .panel-title {
            color: var(--text-gold);
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--yellow-jeopardy);
            padding-bottom: 5px;
            text-transform: uppercase;
        }

        /* LEFT SIDE PANEL: HAND RESPONSIVE WRAP */
        .hand-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (max-width: 1023px) {
            .hand-container {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            .card-tile {
                flex: 1 1 180px;
                max-width: 220px;
            }
        }

        .card-tile {
            background-color: #1a1a1a;
            border: 3px solid #444;
            border-radius: 6px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .card-tile:hover {
            transform: translateX(3px);
        }

        /* Dynamic matching card glow properties driven via inline styles */
        .card-tile.selected {
            border-color: var(--card-glow-color) !important;
            box-shadow: 0 0 12px var(--card-glow-color) !important;
            transform: scale(1.02);
        }

        .card-img-placeholder {
            width: 40px;
            height: 40px;
            background-color: #252525;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 2px solid transparent;
            flex-shrink: 0;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-name {
            font-weight: bold;
            font-size: 13px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-color-indicator {
            font-size: 11px;
            margin-top: 2px;
        }

        /* GRID CENTER COLUMN */
        .grid-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .grid-board {
            display: grid;
            grid-template-rows: repeat(8, 1fr);
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            background-color: #0c0c0c;
            padding: 10px;
            border: 4px solid var(--yellow-jeopardy);
            border-radius: 8px;
            width: 100%;
            max-width: min(750px, 85vw);
            aspect-ratio: 1 / 1;
        }

        .grid-space {
            background-color: var(--blue-jeopardy);
            border: 1.5px solid #333;
            border-radius: 4px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* DYNAMIC SHIFTING NEON MOVEMENT HOVERS */
        .grid-space.valid-move {
            cursor: pointer;
            border-color: var(--active-glow-color, var(--text-gold));
            box-shadow: inset 0 0 6px var(--active-glow-fade, rgba(241, 196, 15, 0.3));
        }

        .grid-space.valid-move:hover {
            box-shadow: inset 0 0 14px var(--active-glow-color, rgba(241, 196, 15, 0.6));
            transform: scale(1.03);
        }

        .grid-space.player-here {
            border: 2px dashed #fff !important;
            box-shadow: 0 0 10px #fff !important;
            z-index: 2;
        }

        .glyph-display {
            font-size: clamp(16px, 3.5vw, 28px);
            user-select: none;
        }

        .grid-space.locked {
            filter: brightness(0.3) grayscale(0.5);
            border-color: #222 !important;
        }

        .grid-space.locked::after {
            content: "🔒";
            position: absolute;
            font-size: clamp(14px, 3vw, 22px);
            color: rgba(255,255,255,0.4);
            z-index: 3;
        }

        /* NEON PULSE FOR MATCHES */
        @keyframes neonPulse {
            0% { box-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px var(--text-gold); border-color: #fff; }
            50% { box-shadow: 0 0 20px var(--text-gold), 0 0 30px var(--text-gold); border-color: var(--text-gold); }
            100% { box-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px var(--text-gold); border-color: #fff; }
        }

        .pulse-match {
            animation: neonPulse 0.5s ease-in-out 3;
        }

        /* RIGHT SIDE PANEL UTILS */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        @media (min-width: 1024px) {
            .stat-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-box {
            background-color: #050505;
            border: 2px solid var(--yellow-jeopardy);
            border-radius: 4px;
            padding: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-gold);
            text-shadow: 0 0 5px rgba(241, 196, 15, 0.4);
            margin-top: 5px;
        }

        .chain-display {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
            min-height: 35px;
        }

        .chain-dot {
            width: 26px;
            height: 26px;
            border-radius: 4px;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
        }

        /* LEADERBOARD MODULE */
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            background: #151515;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            border-left: 3px solid var(--yellow-jeopardy);
        }

        .leaderboard-entry.top-spot {
            border-left-color: var(--text-gold);
            background: #221c02;
        }

        .utils-btn {
            width: 100%;
            background-color: transparent;
            border: 2px solid var(--yellow-jeopardy);
            color: #fff;
            padding: 10px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .utils-btn:hover {
            background-color: var(--yellow-jeopardy);
            text-shadow: 0 0 5px #fff;
        }

        /* GAME OVER OVERLAY */
        #gameOverModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .modal-content {
            background: var(--panel-bg);
            border: 4px solid var(--text-gold);
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 25px var(--text-gold);
        }

        .modal-content input {
            background: #000;
            border: 2px solid var(--yellow-jeopardy);
            color: #fff;
            padding: 8px;
            font-family: monospace;
            text-align: center;
            font-size: 16px;
            margin-top: 15px;
            width: 80%;
            outline: none;
        }

        .modal-content input:focus {
            border-color: var(--text-gold);
        }
    </style>
</head>
<body>

    <div class="board-title">[ BOARD TITLE: ARCADE MODE ]</div>

    <div class="game-container">
        
        <div class="panel">
            <div class="panel-title">Your Hand (5)</div>
            <div id="handContainer" class="hand-container">
                </div>
        </div>

        <div class="grid-wrapper">
            <div id="gridBoard" class="grid-board">
                </div>
        </div>

        <div class="panel">
            <div class="stat-grid">
                <div class="stat-box">
                    <div>TOTAL SCORE</div>
                    <div id="scoreDisplay" class="stat-value">00000</div>
                </div>

                <div class="stat-box">
                    <div>CONNECTIONS</div>
                    <div id="connectionsDisplay" class="stat-value">0</div>
                </div>

                <div class="stat-box">
                    <div>CURRENT CHAIN</div>
                    <div id="chainDisplay" class="chain-display"></div>
                    <div id="chainHint" style="font-size: 11px; margin-top: 5px; color: #aaa;">Collect BRGY!</div>
                </div>
            </div>

            <div class="panel-title" style="margin-top: 15px; font-size: 16px;">Global Leaderboard</div>
            <div id="leaderboardList" class="leaderboard-list">
                </div>

            <div style="margin-top: 20px;">
                <button class="utils-btn" onclick="resetGame()">RESET BOARD</button>
            </div>
        </div>

    </div>

    <div id="gameOverModal">
        <div class="modal-content">
            <h2 style="color: #ff0000; margin-top: 0;">GAME OVER</h2>
            <p>You have run out of available legal moves!</p>
            <h3 style="color: var(--text-gold);">FINAL SCORE: <span id="finalScoreText">0</span></h3>
            <p>Submit your initials to the Leaderboard:</p>
            <input type="text" id="playerInitials" maxlength="10" placeholder="PLAYER_1" value="PLAYER_1">
            <button class="utils-btn" style="margin-top: 15px; border-color: var(--text-gold);" onclick="submitHighScore()">SUBMIT SCORE</button>
        </div>
    </div>

    <script>
        const COLORS = {
            BLUE:   { type: 'BLUE',   name: 'Blue Logo',   glyph: '🌀', color: '#336699', glowFade: 'rgba(51, 102, 153, 0.3)' },
            RED:    { type: 'RED',    name: 'Red Hero',    glyph: '🔺', color: '#ff0000', glowFade: 'rgba(255, 0, 0, 0.3)' },
            GREEN:  { type: 'GREEN',  name: 'Green Gem',   glyph: '🟢', color: '#009900', glowFade: 'rgba(0, 153, 0, 0.3)' },
            YELLOW: { type: 'YELLOW', name: 'Yellow Gold', glyph: '🔶', color: '#f1c40f', glowFade: 'rgba(241, 196, 15, 0.3)' },
            WHITE:  { type: 'WHITE',  name: 'Wild Card',   glyph: '🃏', color: '#ffffff', glowFade: 'rgba(255, 255, 255, 0.3)' }
        };
        const COLOR_POOL = ['BLUE', 'RED', 'GREEN', 'YELLOW', 'WHITE'];

        let score = 0;
        let connectionsCount = 0;
        let currentHand = [];
        let selectedCardIndex = 0;
        let playerPos = null; 
        let boardState = [];
        let currentChain = [];

        let mockLeaderboard = [
            { name: "ARCADE_GOD", score: 22200 },
            { name: "GEOFF", score: 10100 },
            { name: "P1_MARK", score: 9800 },
            { name: "P1_WELL", score: 4600 },
            { name: "P1_CHAMP", score: 1400 }
        ];

        window.onload = function() {
            buildBoardHTML();
            renderLeaderboard();
            resetGame();
        };

        function buildBoardHTML() {
            const grid = document.getElementById('gridBoard');
            grid.innerHTML = '';
            boardState = [];

            for(let r=0; r<8; r++) {
                boardState[r] = [];
                for(let c=0; c<8; c++) {
                    boardState[r][c] = { occupied: false, type: null, locked: false };
                    
                    let space = document.createElement('div');
                    space.id = `space-${r}-${c}`;
                    space.className = 'grid-space';
                    space.onclick = () => handleSpaceClick(r, c);

                    grid.appendChild(space);
                }
            }
        }

        function resetGame() {
            score = 0;
            connectionsCount = 0;
            currentChain = [];
            selectedCardIndex = 0;
            playerPos = null; 
            document.getElementById('gameOverModal').style.display = 'none';

            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    boardState[r][c] = { occupied: false, type: null, locked: false };
                    let el = document.getElementById(`space-${r}-${c}`);
                    
                    el.className = 'grid-space';
                    el.style.borderColor = '#333';
                    el.style.removeProperty('--active-glow-color');
                    el.style.removeProperty('--active-glow-fade');
                    
                    let glyph = el.querySelector('.glyph-display');
                    if(glyph) glyph.remove();
                }
            }

            currentHand = [];
            for(let i=0; i<5; i++) {
                currentHand.push(getRandomCard());
            }

            updateUI();
        }

        function getRandomCard() {
            let randType = COLOR_POOL[Math.floor(Math.random() * COLOR_POOL.length)];
            return COLORS[randType];
        }

        function drawCardAtIndex(index) {
            currentHand[index] = getRandomCard();
        }

        function appendGlyphToSpace(element, cardObj) {
            let glyphSpan = document.createElement('span');
            glyphSpan.className = 'glyph-display';
            glyphSpan.style.textShadow = `0 0 10px ${cardObj.color}`;
            glyphSpan.innerText = cardObj.glyph;
            element.appendChild(glyphSpan);
            element.style.borderColor = cardObj.color;
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = String(score).padStart(5, '0');
            document.getElementById('connectionsDisplay').innerText = connectionsCount;

            // Render Hand Panel with Dynamic Glow Mapping
            const handContainer = document.getElementById('handContainer');
            handContainer.innerHTML = '';
            currentHand.forEach((card, idx) => {
                let cardEl = document.createElement('div');
                cardEl.className = `card-tile ${idx === selectedCardIndex ? 'selected' : ''}`;
                cardEl.style.borderLeft = `5px solid ${card.color}`;
                // Set custom property to explicitly tint the select glow matrix
                cardEl.style.setProperty('--card-glow-color', card.color);
                cardEl.onclick = () => { selectedCardIndex = idx; updateUI(); };

                cardEl.innerHTML = `
                    <div class="card-img-placeholder" style="border-color: ${card.color}">${card.glyph}</div>
                    <div class="card-info">
                        <span class="card-name">${card.name}</span>
                        <span class="card-color-indicator" style="color: ${card.color}">${card.type}</span>
                    </div>
                `;
                handContainer.appendChild(cardEl);
            });

            const chainDisplay = document.getElementById('chainDisplay');
            chainDisplay.innerHTML = '';
            currentChain.forEach(coord => {
                let type = boardState[coord.r][coord.c].type;
                let dot = document.createElement('div');
                dot.className = 'chain-dot';
                dot.style.backgroundColor = COLORS[type].color;
                dot.style.color = type === 'WHITE' ? '#000' : '#fff';
                dot.innerText = type[0];
                chainDisplay.appendChild(dot);
            });
            document.getElementById('chainHint').innerText = playerPos === null ? "Click any tile to begin!" : `Chain length: ${currentChain.length}/4. Target BRGY!`;

            calculateValidMoves();
        }

        function calculateValidMoves() {
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    let el = document.getElementById(`space-${r}-${c}`);
                    el.classList.remove('valid-move', 'player-here');
                }
            }

            let chosenCard = currentHand[selectedCardIndex];

            if (playerPos === null) {
                for(let r=0; r<8; r++) {
                    for(let c=0; c<8; c++) {
                        let el = document.getElementById(`space-${r}-${c}`);
                        el.classList.add('valid-move');
                        el.style.setProperty('--active-glow-color', chosenCard.color);
                        el.style.setProperty('--active-glow-fade', chosenCard.glowFade);
                    }
                }
                return;
            }

            document.getElementById(`space-${playerPos.r}-${playerPos.c}`).classList.add('player-here');

            let potentialMoves = [
                { r: playerPos.r - 1, c: playerPos.c },
                { r: playerPos.r + 1, c: playerPos.c },
                { r: playerPos.r,     c: playerPos.c - 1 },
                { r: playerPos.r,     c: playerPos.c + 1 }
            ];

            let legalMoveExists = false;

            potentialMoves.forEach(m => {
                if(m.r >= 0 && m.r < 8 && m.c >= 0 && m.c < 8) {
                    let targetSpace = boardState[m.r][m.c];
                    if(!targetSpace.occupied && !targetSpace.locked) {
                        let el = document.getElementById(`space-${m.r}-${m.c}`);
                        el.classList.add('valid-move');
                        el.style.setProperty('--active-glow-color', chosenCard.color);
                        el.style.setProperty('--active-glow-fade', chosenCard.glowFade);
                        legalMoveExists = true;
                    }
                }
            });

            if(!legalMoveExists) {
                triggerGameOver();
            }
        }

        function handleSpaceClick(r, c) {
            let el = document.getElementById(`space-${r}-${c}`);
            if(!el.classList.contains('valid-move')) return;

            let chosenCard = currentHand[selectedCardIndex];

            playerPos = { r: r, c: c };
            boardState[r][c].occupied = true;
            boardState[r][c].type = chosenCard.type;

            appendGlyphToSpace(el, chosenCard);
            currentChain.push({ r: r, c: c });

            drawCardAtIndex(selectedCardIndex);
            checkConnectionCondition();
        }

        function checkConnectionCondition() {
            if(currentChain.length === 4) {
                let typesInChain = currentChain.map(coord => boardState[coord.r][coord.c].type);
                
                if(isValidArcadeCombination(typesInChain)) {
                    score += 1000;
                    connectionsCount += 1;
                    
                    let savedChainRef = [...currentChain];
                    currentChain = []; 

                    savedChainRef.forEach(coord => {
                        let cellEl = document.getElementById(`space-${coord.r}-${coord.c}`);
                        cellEl.classList.add('pulse-match');
                        
                        setTimeout(() => {
                            cellEl.classList.remove('pulse-match');
                            cellEl.classList.add('locked');
                            boardState[coord.r][coord.c].locked = true;
                            updateUI();
                        }, 1500);
                    });
                } else {
                    currentChain = [];
                }
            }
            updateUI();
        }

        function isValidArcadeCombination(arr) {
            let counts = { BLUE: 0, RED: 0, GREEN: 0, YELLOW: 0, WHITE: 0 };
            arr.forEach(t => counts[t]++);

            let missingColorsCount = 0;
            if(counts.BLUE === 0) missingColorsCount++;
            if(counts.RED === 0) missingColorsCount++;
            if(counts.GREEN === 0) missingColorsCount++;
            if(counts.YELLOW === 0) missingColorsCount++;

            return counts.WHITE >= missingColorsCount;
        }

        function triggerGameOver() {
            document.getElementById('finalScoreText').innerText = score;
            document.getElementById('gameOverModal').style.display = 'flex';
        }

        function renderLeaderboard() {
            mockLeaderboard.sort((a, b) => b.score - a.score);
            const container = document.getElementById('leaderboardList');
            container.innerHTML = '';

            mockLeaderboard.slice(0, 6).forEach((entry, idx) => {
                let entryEl = document.createElement('div');
                entryEl.className = `leaderboard-entry ${idx === 0 ? 'top-spot' : ''}`;
                entryEl.innerHTML = `
                    <span>${idx + 1}. ${entry.name}</span>
                    <span style="color: var(--text-gold); font-weight:bold;">${String(entry.score).padStart(5, '0')}</span>
                `;
                container.appendChild(entryEl);
            });
        }

        function submitHighScore() {
            let initials = document.getElementById('playerInitials').value.toUpperCase() || "PLAYER_1";
            mockLeaderboard.push({ name: initials, score: score });
            renderLeaderboard();
            resetGame();
        }
    </script>
</body>
</html>
